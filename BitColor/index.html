<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitColor | Random Color Palette</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body>
    <header class="hero-section">
    <h1 class="main-title">Bit<span>Color</span></h1>
    <p class="sub-title">Click a color card to copy the HEX code</p>
</header>

    <main id="colorGrid" class="color-grid"></main>

    <div class="btn-container">
        <button id="generateBtn" class="btn-primary">New Palette</button>
        <button id="loadMoreBtn" class="btn-secondary">Add More</button>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>
</body>
</html>
